openapi: 3.0.3
info:
  title: Site Admin API
  version: "1.0"
  description: Internal API for Site Admin operations.

servers:
  - url: http://localhost:8100
    description: Local development (via nginx)

security:
  - authgear: [openid, email, offline_access]

paths:
  /api/v1/apps:
    get:
      operationId: listApps
      summary: List all apps
      parameters:
        - name: page
          in: query
          description: Page number, 1-based. Defaults to 1.
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: page_size
          in: query
          description: Number of apps per page. Defaults to 20, maximum 20.
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 20
        - name: app_id
          in: query
          description: Filter by app ID prefix. Returns all apps whose ID starts with the given value.
          schema:
            type: string
        - name: collaborator_search
          in: query
          description: >
            Filter by collaborator keyword. Searches the portal user database by partial
            email, name, or other attributes. Returns apps that have any collaborator
            (owner or editor) whose profile matches the keyword. When provided and `sort`
            is omitted, defaults to `sort=relevance`. At most 20 matching users are
            considered; if more than 20 users match, `collaborator_search_truncated` is
            set to `true` in the response and `total_count` is a lower bound.
          schema:
            type: string
        - name: plan
          in: query
          description: Filter by plan name.
          schema:
            type: string
        - name: sort
          in: query
          description: >
            Field to sort by. Defaults to `created_at`, or `relevance` when
            `collaborator_search` is provided. `relevance` sorts by how well the
            app's best-matching collaborator matches the `collaborator_search`
            keyword and requires `collaborator_search` to be set; using `relevance`
            without `collaborator_search` returns 400.
          schema:
            type: string
            enum:
              - created_at
              - mau
              - relevance
            default: created_at
        - name: order
          in: query
          description: >
            Sort direction. Defaults to `desc`. Ignored when `sort=relevance`
            (relevance is always highest-match first).
          schema:
            $ref: "#/components/schemas/OrderDirection"
      responses:
        "200":
          description: A list of apps
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppsListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/audit-logs:
    get:
      operationId: listAuditLogs
      summary: List site admin audit log entries
      description: >
        Returns audit log entries for actions performed by site admins
        (e.g. plan changes, collaborator mutations). These are distinct from
        per-app user-event logs, which will be available at
        /api/v1/apps/{app_id}/audit-logs in the future.
      parameters:
        - name: page
          in: query
          description: Page number, 1-based. Defaults to 1.
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: page_size
          in: query
          description: Number of entries per page. Defaults to 20, maximum 100.
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: affected_app_id
          in: query
          description: >
            Filter by the app that was acted on. When provided, only entries
            whose payload.app_id matches this value are returned.
          schema:
            type: string
        - name: order
          in: query
          description: Sort direction for created_at. Defaults to `desc` (newest first).
          schema:
            $ref: "#/components/schemas/OrderDirection"
      responses:
        "200":
          description: A list of site admin audit log entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteAdminAuditLogsListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/audit-logs/{id}:
    get:
      operationId: getAuditLog
      summary: Get a site admin audit log entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Site admin audit log entry with raw data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteAdminAuditLogDetail"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/plans:
    get:
      operationId: listPlans
      summary: List all available plans
      responses:
        "200":
          description: A list of plans
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlansListResponse"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/apps/{app_id}/plan:
    post:
      operationId: changeAppPlan
      summary: Change the plan of an app
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeAppPlanRequest"
      responses:
        "200":
          description: Plan changed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/App"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/apps/{app_id}/usage/messaging:
    get:
      operationId: getAppMessagingUsage
      summary: Get messaging usage for an app over a date range
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            type: string
        - name: start_date
          in: query
          required: true
          description: Start of the date range, inclusive. Format YYYY-MM-DD.
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          required: true
          description: End of the date range, inclusive. Format YYYY-MM-DD.
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Messaging usage aggregated over the given date range
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagingUsage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/apps/{app_id}/usage/monthly-active-users:
    get:
      operationId: getAppMonthlyActiveUsers
      summary: Get monthly active users for an app over a range of months
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            type: string
        - name: start_year
          in: query
          required: true
          description: The year of the start month, inclusive.
          schema:
            type: integer
        - name: start_month
          in: query
          required: true
          description: The start month, inclusive (1-12).
          schema:
            type: integer
            minimum: 1
            maximum: 12
        - name: end_year
          in: query
          required: true
          description: The year of the end month, inclusive.
          schema:
            type: integer
        - name: end_month
          in: query
          required: true
          description: The end month, inclusive (1-12).
          schema:
            type: integer
            minimum: 1
            maximum: 12
      responses:
        "200":
          description: Monthly active user counts for each month in the given range
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthlyActiveUsersUsage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/apps/{app_id}/collaborators:
    get:
      operationId: listAppCollaborators
      summary: List collaborators of an app
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: A list of collaborators
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollaboratorsListResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      operationId: addAppCollaborator
      summary: Add a collaborator to an app directly
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddCollaboratorRequest"
      responses:
        "200":
          description: The newly added collaborator
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Collaborator"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/apps/{app_id}/collaborators/{collaborator_id}:
    delete:
      operationId: removeAppCollaborator
      summary: Remove a collaborator from an app
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            type: string
        - name: collaborator_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Collaborator removed successfully
          content:
            application/json:
              schema:
                type: object
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/apps/{app_id}/collaborators/{collaborator_id}/promote:
    post:
      operationId: promoteCollaboratorToOwner
      summary: Promote a collaborator to owner, demoting the current owner to editor
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            type: string
        - name: collaborator_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The promoted collaborator
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Collaborator"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/apps/{app_id}:
    get:
      operationId: getApp
      summary: Get app details
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: App details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    authgear:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: http://accounts.portal.localhost:3100/oauth2/authorize
          tokenUrl: http://accounts.portal.localhost:3100/oauth2/token
          scopes:
            openid: OpenID Connect identity token
            email: User email address
            offline_access: Refresh token for offline access

  responses:
    BadRequest:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Forbidden:
      description: Caller does not have permission to perform this action
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFound:
      description: The requested resource was not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"

  schemas:
    ErrorEnvelope:
      description: Error response envelope matching the api.Response struct.
      type: object
      required:
        - error
      properties:
        error:
          $ref: "#/components/schemas/APIError"

    APIError:
      x-go-type: apierrors.APIError
      x-go-type-import:
        name: apierrors
        path: github.com/authgear/authgear-server/pkg/api/apierrors
      description: >
        Error detail matching the apierrors.APIError struct.
        name and reason identify the error kind; code mirrors the HTTP status.
      type: object
      required:
        - name
        - reason
        - message
        - code
      properties:
        name:
          type: string
          description: Error kind name (e.g. BadRequest, Forbidden, NotFound)
          enum:
            - BadRequest
            - Invalid
            - Unauthorized
            - Forbidden
            - NotFound
            - AlreadyExists
            - TooManyRequest
            - InternalError
            - ServiceUnavailable
            - RequestEntityTooLarge
        reason:
          type: string
          description: More specific reason within the kind (e.g. ValidationFailed)
        message:
          type: string
          description: Human-readable error message
        code:
          type: integer
          description: HTTP status code
        tracking_id:
          type: string
          description: Opaque ID for correlating errors in logs
        info:
          type: object
          description: Additional structured details about the error
          additionalProperties: true

    MessagingUsage:
      type: object
      required:
        - start_date
        - end_date
        - sms_north_america_count
        - sms_other_regions_count
        - whatsapp_north_america_count
        - whatsapp_other_regions_count
      properties:
        start_date:
          type: string
          format: date
          description: Start of the date range, inclusive. Format YYYY-MM-DD.
        end_date:
          type: string
          format: date
          description: End of the date range, inclusive. Format YYYY-MM-DD.
        sms_north_america_count:
          type: integer
          description: Number of SMS messages sent in North America
        sms_other_regions_count:
          type: integer
          description: Number of SMS messages sent in other regions
        whatsapp_north_america_count:
          type: integer
          description: Number of WhatsApp messages sent in North America
        whatsapp_other_regions_count:
          type: integer
          description: Number of WhatsApp messages sent in other regions

    MonthlyActiveUsersUsage:
      type: object
      required:
        - counts
      properties:
        counts:
          type: array
          items:
            $ref: "#/components/schemas/MonthlyActiveUsersCount"

    MonthlyActiveUsersCount:
      type: object
      required:
        - year
        - month
        - count
      properties:
        year:
          type: integer
        month:
          type: integer
          minimum: 1
          maximum: 12
        count:
          type: integer
          description: Number of monthly active users in this month

    CollaboratorsListResponse:
      type: object
      required:
        - collaborators
      properties:
        collaborators:
          type: array
          items:
            $ref: "#/components/schemas/Collaborator"

    Collaborator:
      type: object
      required:
        - id
        - app_id
        - user_id
        - user_email
        - role
        - created_at
      properties:
        id:
          type: string
          description: The collaborator record ID
        app_id:
          type: string
          description: The app this collaborator belongs to
        user_id:
          type: string
          description: The user ID of the collaborator
        user_email:
          type: string
          format: email
          description: The email address of the collaborator
        role:
          $ref: "#/components/schemas/CollaboratorRole"
        created_at:
          type: string
          format: date-time
          description: When the collaborator was added, in RFC 3339 format

    CollaboratorRole:
      type: string
      enum:
        - owner
        - editor
      description: The role of a collaborator within an app

    AddCollaboratorRequest:
      type: object
      required:
        - user_email
      properties:
        user_email:
          type: string
          format: email
          description: The email address of the user to add as a collaborator. The role is always editor.

    AppsListResponse:
      type: object
      required:
        - apps
        - total_count
        - page
        - page_size
        - collaborator_search_truncated
      properties:
        apps:
          type: array
          items:
            $ref: "#/components/schemas/App"
        total_count:
          type: integer
          description: >
            Total number of apps matching the query. When `collaborator_search_truncated`
            is `true`, this is a lower bound — apps whose collaborators are beyond the
            20-match cap are not counted.
        page:
          type: integer
          format: uint64
          description: Current page number.
        page_size:
          type: integer
          format: uint64
          description: Number of apps per page.
        collaborator_search_truncated:
          type: boolean
          description: >
            True when the `collaborator_search` keyword matched more than 20 portal
            users and results are limited to the top 20 matches. `total_count` is a
            lower bound in this case. Always `false` when `collaborator_search` is
            not provided.

    App:
      type: object
      required:
        - id
        - owner_email
        - plan
        - created_at
        - last_month_mau
      properties:
        id:
          type: string
          description: The app ID
        owner_email:
          type: string
          format: email
          description: Email address of the app owner
        plan:
          type: string
          description: The plan the app is on
        created_at:
          type: string
          format: date-time
          description: The time the app was created, in RFC 3339 format
        last_month_mau:
          type: integer
          description: Monthly active users in the last complete calendar month. 0 if no data is available.

    Plan:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: The plan name

    PlansListResponse:
      type: object
      required:
        - plans
      properties:
        plans:
          type: array
          items:
            $ref: "#/components/schemas/Plan"

    ChangeAppPlanRequest:
      type: object
      required:
        - plan_name
      properties:
        plan_name:
          type: string
          description: The plan to assign to the app

    OrderDirection:
      type: string
      description: Sort direction.
      enum:
        - asc
        - desc

    AppDetail:
      allOf:
        - $ref: "#/components/schemas/App"
        - type: object
          required:
            - user_count
          properties:
            user_count:
              type: integer
              description: Number of users in the app

    SiteAdminAuditLogsListResponse:
      type: object
      required:
        - audit_logs
        - total_count
        - page
        - page_size
      properties:
        audit_logs:
          type: array
          items:
            $ref: "#/components/schemas/SiteAdminAuditLog"
        total_count:
          type: integer
          description: Total number of entries matching the query.
        page:
          type: integer
          format: uint64
          description: Current page number.
        page_size:
          type: integer
          format: uint64
          description: Number of entries per page.

    SiteAdminAuditLog:
      type: object
      required:
        - id
        - created_at
        - activity_type
      properties:
        id:
          type: string
          description: Audit log entry ID (hex-encoded sequence number).
        created_at:
          type: string
          format: date-time
          description: When the event occurred, in RFC 3339 format.
        activity_type:
          type: string
          description: The site admin activity type (e.g. site_admin.app.plan.updated).
        ip_address:
          type: string
          description: IP address of the actor.
        user_agent:
          type: string
          description: User agent string of the actor's browser.
        actor_user_id:
          type: string
          description: >
            Portal user ID of the site admin who performed the action,
            extracted from audit_context.actor_user_id.
        affected_app_id:
          type: string
          description: >
            ID of the app that was acted on, extracted from
            data.payload.app_id.

    SiteAdminAuditLogDetail:
      allOf:
        - $ref: "#/components/schemas/SiteAdminAuditLog"
        - type: object
          required:
            - data
          properties:
            data:
              type: object
              description: >
                Raw audit log data — the full event JSON stored in the
                _audit_log.data column, including context and payload.
              additionalProperties: true
