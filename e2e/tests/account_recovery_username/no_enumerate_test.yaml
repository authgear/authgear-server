name: Account Recovery by Username with enumerate_destinations false
authgear.yaml:
  override: |
    authentication_flow:
      account_recovery_flows:
      - name: default
        steps:
        - type: identify
          one_of:
          - identification: username
            on_failure: ignore
            steps:
            - type: select_destination
              allowed_channels:
              - channel: email
                otp_form: link
        - type: verify_account_recovery_code
        - type: reset_password
before:
  - type: user_import
    user_import: users.json
steps:
- action: "create"
  input: |
    {
      "type": "account_recovery",
      "name": "default"
    }
  output:
    result: |
      {
        "state_token": "[[string]]",
        "type": "account_recovery",
        "name": "default",
        "action": {
          "type": "identify",
          "data": {
            "type": "account_recovery_identification_data",
            "options": [
              "[[arrayof]]",
              {
                "identification": "[[string]]"
              }
            ]
          }
        }
      }

- action: input
  input: |
    {
      "identification": "username",
      "login_id": "e2e_recovery_user"
    }
  output:
    result: |
      {
        "state_token": "[[string]]",
        "type": "account_recovery",
        "name": "default",
        "action": {
          "type": "select_destination",
          "data": {
            "type": "account_recovery_select_destination_data",
            "options": [
              {
                "masked_display_name": "e2e_recovery_user",
                "channel": "email",
                "otp_form": "link"
              }
            ]
          }
        }
      }

- action: input
  input: |
    {
      "index": 0
    }
  output:
    result: |
      {
        "state_token": "[[string]]",
        "type": "account_recovery",
        "name": "default",
        "action": {
          "type": "verify_account_recovery_code",
          "data": {
            "type": "account_recovery_verify_code_data",
            "masked_display_name": "e2e_recovery_user",
            "channel": "email",
            "otp_form": "link",
            "code_length": 32,
            "can_resend_at": "[[string]]"
          }
        }
      }

- action: input
  input: |
    {
      "account_recovery_code": "{{ linkOTPCode "email" "e2e_recovery_user@example.com" }}"
    }
  output:
    result: |
      {
        "state_token": "[[string]]",
        "type": "account_recovery",
        "name": "default",
        "action": {
          "type": "reset_password",
          "data": {
            "password_policy": {
              "history": {
                "enabled": false
              },
              "minimum_length": 8
            },
            "type": "new_password_data"
          }
        }
      }

- action: input
  input: |
    {
      "new_password": "Abcd1234Abcd1234!"
    }
  output:
    result: |
      {
        "state_token": "[[string]]",
        "type": "account_recovery",
        "name": "default",
        "action": {
          "type": "finished"
        }
      }
