name: Fraud protection - SMS unverified OTPs by phone country hourly blocking
authgear.yaml:
  override: |
    fraud_protection:
      decision:
        action: deny_if_any_warning
steps:
  # Flow 1 - SG number, succeeds
  - name: flow 1 - create
    action: create
    input: |
      {"type": "signup", "name": "default"}
  - name: flow 1 - identify phone
    action: input
    input: |
      {"identification": "phone", "login_id": "+6591230001"}
  - name: flow 1 - send sms
    action: input
    input: |
      {"channel": "sms"}
    output:
      result: |
        {"action": {"type": "verify"}}

  # Flow 2 - different SG number, succeeds
  - name: flow 2 - create
    action: create
    input: |
      {"type": "signup", "name": "default"}
  - name: flow 2 - identify phone
    action: input
    input: |
      {"identification": "phone", "login_id": "+6591230002"}
  - name: flow 2 - send sms
    action: input
    input: |
      {"channel": "sms"}
    output:
      result: |
        {"action": {"type": "verify"}}

  # Flow 3 - another SG number, succeeds
  - name: flow 3 - create
    action: create
    input: |
      {"type": "signup", "name": "default"}
  - name: flow 3 - identify phone
    action: input
    input: |
      {"identification": "phone", "login_id": "+6591230003"}
  - name: flow 3 - send sms
    action: input
    input: |
      {"channel": "sms"}
    output:
      result: |
        {"action": {"type": "verify"}}

  # Flow 4 - SG number, blocked by fraud protection
  - name: flow 4 - create
    action: create
    input: |
      {"type": "signup", "name": "default"}
  - name: flow 4 - identify phone
    action: input
    input: |
      {"identification": "phone", "login_id": "+6591230004"}
  - name: flow 4 - send sms (blocked)
    action: input
    input: |
      {"channel": "sms"}
    output:
      error: |
        {
          "name": "TooManyRequest",
          "reason": "BlockedByFraudProtection",
          "code": 429
        }
