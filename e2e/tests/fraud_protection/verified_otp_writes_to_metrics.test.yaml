name: Fraud protection - verified OTP writes to audit metrics
steps:
  # Verify an SMS OTP to trigger RecordSMSOTPVerified
  - name: create signup flow
    action: create
    input: |
      {"type": "signup", "name": "default"}

  - name: identify phone
    action: input
    input: |
      {"identification": "phone", "login_id": "+6591230001"}

  - name: send sms
    action: input
    input: |
      {"channel": "sms"}
    output:
      result: |
        {"action": {"type": "verify"}}

  - name: verify otp
    action: input
    input: |
      {"code": "111111"}

  # After OTP verification:
  # - sms_otp_verified has 2 rows (IP + phone_country)
  # - sms_otp_unverified_count_drained has 2 rows (IP + phone_country)
  - name: check audit metrics rows
    action: audit_query
    audit_query: |
      SELECT name, COUNT(*) AS n
      FROM _audit_metrics
      WHERE app_id = '{{ .AppID }}'
        AND name IN ('sms_otp_unverified_count_drained', 'sms_otp_verified')
      GROUP BY name
      ORDER BY name
    audit_query_output:
      rows: |
        [
          {
            "name": "sms_otp_unverified_count_drained",
            "n": "2"
          },
          {
            "name": "sms_otp_verified",
            "n": "2"
          }
        ]
