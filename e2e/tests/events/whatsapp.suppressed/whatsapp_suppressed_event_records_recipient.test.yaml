name: Whatsapp suppressed event records recipient
authgear.yaml:
  override: |
    authenticator:
      oob_otp:
        sms:
          phone_otp_mode: whatsapp_sms
    test_mode:
      whatsapp:
        enabled: true
        rules:
        - regex: "^\\+85265000004$"
          suppressed: true
    authentication_flow:
      signup_flows:
      - name: default
        steps:
        - name: signup_identify
          type: identify
          one_of:
          - identification: email
            steps:
            - name: create_primary_password
              type: create_authenticator
              one_of:
              - authentication: primary_password
            - name: create_secondary_phone
              type: create_authenticator
              one_of:
              - authentication: secondary_oob_otp_sms
steps:
  - name: create signup flow
    action: create
    input: |
      {
        "type": "signup",
        "name": "default"
      }
    output:
      result: |
        {
          "action": {
            "type": "identify"
          }
        }
  - name: identify email
    action: input
    input: |
      {
        "identification": "email",
        "login_id": "whatsapp-suppressed@example.com"
      }
    output:
      result: |
        {
          "action": {
            "type": "create_authenticator"
          }
        }
  - name: create primary password
    action: input
    input: |
      {
        "authentication": "primary_password",
        "new_password": "Password123!"
      }
    output:
      result: |
        {
          "action": {
            "type": "create_authenticator"
          }
        }
  - name: start secondary phone authenticator
    action: input
    input: |
      {
        "authentication": "secondary_oob_otp_sms",
        "target": "+85265000004"
      }
    output:
      result: |
        {
          "action": {
            "type": "create_authenticator",
            "authentication": "secondary_oob_otp_sms",
            "data": {
              "type": "select_oob_otp_channels_data"
            }
          }
        }
  - name: choose whatsapp channel
    action: input
    input: |
      {
        "channel": "whatsapp"
      }
    output:
      result: |
        {
          "action": {
            "type": "create_authenticator",
            "authentication": "secondary_oob_otp_sms",
            "data": {
              "type": "verify_oob_otp_data",
              "channel": "whatsapp"
            }
          }
        }
  - name: verify suppressed whatsapp payload records recipient
    action: audit_query
    audit_query: |
      SELECT
        activity_type,
        data->'payload'->>'recipient' AS recipient
      FROM _audit_log
      WHERE app_id = '{{ .AppID }}'
        AND activity_type = 'whatsapp.suppressed'
      ORDER BY created_at, id
    audit_query_output:
      rows: |
        [
          {
            "activity_type": "whatsapp.suppressed",
            "recipient": "+85265000004"
          }
        ]
