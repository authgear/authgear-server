---
name: Invalid or expired end_session logout stash falls back to a plain end_session request
steps:
  # x_end_session_ref is present but no matching stash cookie was ever set in
  # this browser (e.g. a stale link revisited from browser history after the
  # short-lived stash cookie expired): resumeFromStash logs a warning and
  # falls back to treating this as an end_session request with no
  # parameters at all, rather than surfacing ErrEndSessionStashInvalid as an
  # error. With no session and no post_logout_redirect_uri, that resolves to
  # the same invalid-redirect-URI path as any other parameterless request:
  # a redirect to the settings page, not a 400/500.
  - name: end_session
    action: http_request
    http_request_method: GET
    http_request_url: http://{{ .AppID }}.authgeare2e.localhost:4000/oauth2/end_session
    http_request_query:
      x_end_session_ref: not-a-real-sealed-value
    http_request_follow_redirects: false
    http_output:
      http_status: 302
