name: Malformed id_token_hint is treated as absent, confirmation page shown, not an error
before:
  - type: user_import
    user_import: end_session_id_token_hint_users.json
steps:
  - name: oauth_setup
    action: oauth_setup
    oauth_setup_sso_enabled: true

  - name: create_flow
    action: create
    input: |
      {
        "type": "login",
        "name": "default",
        "url_query": "{{ .steps.oauth_setup.result.query }}"
      }
    output:
      result: |
        {
          "action": {
            "type": "identify"
          }
        }

  - name: identify
    action: input
    input: |
      {
        "identification": "username",
        "login_id": "e2e_esh_user1"
      }
    output:
      result: |
        {
          "action": {
            "type": "authenticate"
          }
        }

  - name: authenticate
    action: input
    input: |
      {
        "authentication": "primary_password",
        "password": "password"
      }
    output:
      result: |
        {
          "action": {
            "type": "finished",
            "data": {
              "finish_redirect_uri": "[[string]]"
            }
          }
        }

  # id_token_hint is present (even though malformed), so the SameSiteStrict
  # fast path is skipped regardless of that cookie's value: no clear_cookies
  # step is needed here, unlike the hint-less call in the sid-mismatch case
  # above.
  - name: end_session
    action: http_request
    http_request_method: GET
    http_request_url: http://{{ .AppID }}.authgeare2e.localhost:4000/oauth2/end_session
    http_request_query:
      id_token_hint: not-a-valid-jwt
      post_logout_redirect_uri: http://localhost:4000/after-logout
    http_output:
      http_status: 200
      redirect_path: /logout

