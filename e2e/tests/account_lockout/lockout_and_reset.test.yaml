name: Test account lockout and reset functionality
authgear.yaml:
  override: |
    authentication:
      lockout:
        max_attempts: 2
        history_duration: "1h"
        minimum_duration: "1m"
        maximum_duration: "5m"
        backoff_factor: 2
        lockout_type: "per_user"
        password:
          enabled: true
    authentication_flow:
      login_flows:
      - name: default
        steps:
        - type: identify
          one_of:
          - identification: email
        - type: authenticate
          one_of:
          - authentication: primary_password
before:
  - type: custom_sql
    custom_sql:
      path: fixtures.sql
steps:
  - name: get_user_id
    action: query
    query: |
      SELECT "id" FROM "_auth_user"
      WHERE "app_id" = '{{ .AppID }}'
      ORDER BY "created_at" DESC
      LIMIT 1
    query_output:
      rows: |
        [
          {
            "id": "[[string]]"
          }
        ]
  # First failed login attempt
  - name: create_flow_1
    action: create
    input: |
      {
        "type": "login",
        "name": "default"
      }
    output:
      result: |
        {
          "state_token": "[[string]]",
          "action": {
            "type": "identify"
          }
        }
  - name: identify_user_1
    action: input
    input: |
      {
        "identification": "email",
        "login_id": "lockout_test_{{ .AppID }}@example.com"
      }
    output:
      result: |
        {
          "state_token": "[[string]]",
          "action": {
            "type": "authenticate"
          }
        }
  - name: wrong_password_1
    action: input
    input: |
      {
        "authentication": "primary_password",
        "password": "wrong_password_attempt_1"
      }
    output:
      error: |
        {
          "name": "Unauthorized",
          "reason": "InvalidCredentials"
        }
  # Second failed login attempt (triggers lockout)
  - name: create_flow_2
    action: create
    input: |
      {
        "type": "login",
        "name": "default"
      }
    output:
      result: |
        {
          "state_token": "[[string]]",
          "action": {
            "type": "identify"
          }
        }
  - name: identify_user_2
    action: input
    input: |
      {
        "identification": "email",
        "login_id": "lockout_test_{{ .AppID }}@example.com"
      }
    output:
      result: |
        {
          "state_token": "[[string]]",
          "action": {
            "type": "authenticate"
          }
        }
  - name: wrong_password_2
    action: input
    input: |
      {
        "authentication": "primary_password",
        "password": "wrong_password_attempt_2"
      }
    output:
      error: |
        {
          "name": "TooManyRequest",
          "reason": "AccountLockout"
        }
  # Query to verify user is now locked
  - name: query_locked_user
    action: admin_api_graphql
    admin_api_request:
      query: |
        query getUser($userID: ID!) {
          node(id: $userID) {
            ... on User {
              id
              accountLockout {
                isLocked
                lockoutType
                lockedUntil
              }
            }
          }
        }
      variables: |
        {
          "userID": "{{ nodeID "User" (index .steps.get_user_id.result.rows 0).id }}"
        }
    admin_api_output:
      result: |
        {
          "data": {
            "node": {
              "id": "{{ nodeID "User" (index .steps.get_user_id.result.rows 0).id }}",
              "accountLockout": {
                "isLocked": true,
                "lockoutType": "per_user",
                "lockedUntil": "[[string]]"
              }
            }
          },
          "errors": null
        }
  # Reset the lockout
  - name: reset_account_lockout
    action: admin_api_graphql
    admin_api_request:
      query: |
        mutation resetAccountLockout($userID: ID!) {
          resetAccountLockout(input: { userID: $userID }) {
            user {
              id
              accountLockout {
                isLocked
                lockoutType
                lockedUntil
              }
            }
          }
        }
      variables: |
        {
          "userID": "{{ nodeID "User" (index .steps.get_user_id.result.rows 0).id }}"
        }
    admin_api_output:
      result: |
        {
          "data": {
            "resetAccountLockout": {
              "user": {
                "id": "{{ nodeID "User" (index .steps.get_user_id.result.rows 0).id }}",
                "accountLockout": {
                  "isLocked": false,
                  "lockoutType": "per_user",
                  "lockedUntil": null
                }
              }
            }
          },
          "errors": null
        }
  # Query to verify user is now unlocked
  - name: query_unlocked_user
    action: admin_api_graphql
    admin_api_request:
      query: |
        query getUser($userID: ID!) {
          node(id: $userID) {
            ... on User {
              id
              accountLockout {
                isLocked
                lockoutType
                lockedUntil
              }
            }
          }
        }
      variables: |
        {
          "userID": "{{ nodeID "User" (index .steps.get_user_id.result.rows 0).id }}"
        }
    admin_api_output:
      result: |
        {
          "data": {
            "node": {
              "id": "{{ nodeID "User" (index .steps.get_user_id.result.rows 0).id }}",
              "accountLockout": {
                "isLocked": false,
                "lockoutType": "per_user",
                "lockedUntil": null
              }
            }
          },
          "errors": null
        }
