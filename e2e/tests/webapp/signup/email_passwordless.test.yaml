name: Signup with passwordless email OTP via webapp
authgear.yaml:
  override: |
    authentication:
      identities:
      - login_id
      primary_authenticators:
      - oob_otp_email
    identity:
      login_id:
        keys:
        - key: email
          type: email
    authenticator:
      oob_otp:
        email:
          email_otp_mode: code
steps:
  - name: oauth_setup
    action: oauth_setup
  - name: get_signup_page
    action: http_request
    http_request_method: GET
    http_request_url: http://127.0.0.1:4000/signup?{{ .steps.oauth_setup.result.query }}&q_login_id_key=email&q_login_id_input_type=email
    http_output:
      http_status: 200
      redirect_path: /signup
  - name: submit_signup_id
    action: http_request
    http_request_method: POST
    http_request_url: "{{ .steps.get_signup_page.result.http_final_url }}"
    http_request_form_urlencoded_body:
      q_login_id_key: email
      q_login_id: webapp-signup-passwordless@example.com
      x_action: login_id
    http_output:
      http_status: 200
      redirect_path: /authflow/v2/enter_oob_otp
      html_xpath_exists:
        - /html/body//input[@name='x_code']
  - name: submit_code
    action: http_request
    http_request_method: POST
    http_request_url: "{{ .steps.submit_signup_id.result.http_final_url }}"
    http_request_follow_redirects: false
    http_request_form_urlencoded_body:
      x_code: "111111"
      x_action: submit
    http_output:
      http_status: 302
  - name: finish_flow
    action: http_request
    http_request_method: GET
    http_request_url: "http://127.0.0.1:4000{{ .steps.submit_code.result.http_response_headers.location }}"
    http_request_follow_redirects: false
    http_output:
      http_status: 302
  - action: oauth_exchange_code
    oauth_exchange_code_code_verifier: "{{ .steps.oauth_setup.result.code_verifier }}"
    oauth_exchange_code_redirect_uri: "{{ .steps.finish_flow.result.http_response_headers.location }}"
    output:
      result: |
        {
          "id_token": {
            "sub": "[[string]]"
          }
        }
  - action: query
    query: |
      SELECT id
      FROM _auth_user
      WHERE app_id = '{{ .AppID }}'
      AND standard_attributes ->> 'email' = 'webapp-signup-passwordless@example.com';
    query_output:
      rows: |
        [
          {
            "id": "[[string]]"
          }
        ]
