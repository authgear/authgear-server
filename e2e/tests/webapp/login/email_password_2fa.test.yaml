name: Login with email password and TOTP 2FA via webapp
authgear.yaml:
  override: |
    authentication:
      identities:
      - login_id
      primary_authenticators:
      - password
      secondary_authenticators:
      - totp
      secondary_authentication_mode: required
    identity:
      login_id:
        keys:
        - key: email
          type: email
before:
  - type: user_import
    user_import: users.json
steps:
  - name: oauth_setup
    action: oauth_setup
  - name: get_login_page
    action: http_request
    http_request_method: GET
    http_request_url: http://127.0.0.1:4000/login?{{ .steps.oauth_setup.result.query }}
    http_output:
      http_status: 200
      redirect_path: /login
  - name: submit_login_id
    action: http_request
    http_request_method: POST
    http_request_url: "{{ .steps.get_login_page.result.http_final_url }}"
    http_request_form_urlencoded_body:
      x_login_id_input_type: email
      x_login_id: webapp-login-2fa@example.com
      x_action: login_id
    http_output:
      http_status: 200
      redirect_path: /authflow/v2/enter_password
      html_xpath_exists:
        - /html/body//input[@name='x_password']
  - name: submit_password
    action: http_request
    http_request_method: POST
    http_request_url: "{{ .steps.submit_login_id.result.http_final_url }}"
    http_request_form_urlencoded_body:
      x_password: password
    http_output:
      http_status: 200
      redirect_path: /authflow/v2/enter_totp
      html_xpath_exists:
        - /html/body//input[@name='x_code']
  - name: submit_code
    action: http_request
    http_request_method: POST
    http_request_url: "{{ .steps.submit_password.result.http_final_url }}"
    http_request_follow_redirects: false
    http_request_form_urlencoded_body:
      x_code: '{{ generateTOTPCode "3I526Y3Y7GSXO34RTFEEFXCJM6Y4VZXR" }}'
      x_action: submit
    http_output:
      http_status: 302
  - name: finish_flow
    action: http_request
    http_request_method: GET
    http_request_url: "http://127.0.0.1:4000{{ .steps.submit_code.result.http_response_headers.location }}"
    http_request_follow_redirects: false
    http_output:
      http_status: 302
  - action: oauth_exchange_code
    oauth_exchange_code_code_verifier: "{{ .steps.oauth_setup.result.code_verifier }}"
    oauth_exchange_code_redirect_uri: "{{ .steps.finish_flow.result.http_response_headers.location }}"
    output:
      result: |
        {
          "id_token": {
            "sub": "[[string]]"
          }
        }
