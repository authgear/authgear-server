name: Project usage soft limit allows requests after alert threshold
authgear.yaml:
  override: |
    usage:
      limits:
        sms:
        - quota: 1
          period: "day"
          action: "alert"
steps:
  - name: flow 1 - create
    action: create
    input: |
      {
        "type": "signup",
        "name": "default"
      }
  - name: flow 1 - identify phone
    action: input
    input: |
      {
        "identification": "phone",
        "login_id": "+6591231201"
      }
  - name: flow 1 - send sms
    action: input
    input: |
      {
        "channel": "sms"
      }
    output:
      result: |
        {
          "action": {
            "type": "verify"
          }
        }

  - name: flow 2 - create
    action: create
    input: |
      {
        "type": "signup",
        "name": "default"
      }
  - name: flow 2 - identify phone
    action: input
    input: |
      {
        "identification": "phone",
        "login_id": "+6591231202"
      }
  - name: flow 2 - send sms
    action: input
    input: |
      {
        "channel": "sms"
      }
    output:
      result: |
        {
          "action": {
            "type": "verify"
          }
        }
