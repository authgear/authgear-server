name: Get user by OAuth - found
before:
  - type: custom_sql
    custom_sql:
      path: get_users_admin_api_user.sql
steps:
  - name: get_user_by_oauth_found
    action: admin_api_graphql
    admin_api_request:
      query: |
        query {
          getUserByOAuth(oauthProviderAlias:"azureadv2", oauthProviderUserID: "e2e_admin_api_get_user_oauth_id") {
            createdAt
            formattedName
            lastLoginAt
          }
        }
      variables: |
        {}
    admin_api_output:
      result: |
        {
          "data": {
            "getUserByOAuth": {
              "createdAt": "2024-08-27T07:51:42.040683Z",
              "formattedName": "e2e OAuth user",
              "lastLoginAt": null
            }
          },
          "errors": null
        }

