name: Get user by login ID - email
before:
  - type: custom_sql
    custom_sql:
      path: get_users_admin_api_user.sql
steps:
  - name: get_user_by_loginid_email
    action: admin_api_graphql
    admin_api_request:
      query: |
        query {
          getUserByLoginID(loginIDKey:"email", loginIDValue: "e2e_admin_api_get_users@example.com") {
            createdAt
            standardAttributes
            lastLoginAt
          }
        }
      variables: |
        {}
    admin_api_output:
      result: |
        {
          "data": {
            "getUserByLoginID": {
              "createdAt": "2024-08-27T07:51:42.040683Z",
              "lastLoginAt": null,
              "standardAttributes": {
                "email": "e2e_admin_api_get_users@example.com",
                "email_verified": false,
                "updated_at": 1724745102
              }
            }
          },
          "errors": null
        }

