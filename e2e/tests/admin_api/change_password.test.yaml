name: Reset password via admin API changes password hash and sends email
before:
  - type: user_import
    user_import: users.json
steps:
  - name: get_user
    action: query
    query: |
      SELECT _auth_user.id AS user_id, _auth_authenticator_password.password_hash AS original_hash
      FROM _auth_authenticator
      JOIN _auth_authenticator_password ON _auth_authenticator_password.id = _auth_authenticator.id
      JOIN _auth_user ON _auth_authenticator.user_id = _auth_user.id
      WHERE _auth_authenticator.app_id = '{{ .AppID }}'
        AND _auth_user.standard_attributes ->> 'preferred_username' = 'change_password_test'
    query_output:
      rows: |
        [
          {
            "user_id": "[[string]]",
            "original_hash": "[[string]]"
          }
        ]
  - name: reset_password
    action: admin_api_graphql
    admin_api_request:
      query: |
        mutation resetPasswordMutation(
          $userID: ID!
          $password: String!
          $sendPassword: Boolean
          $setPasswordExpired: Boolean
        ) {
          resetPassword(input: {
            userID: $userID
            password: $password
            sendPassword: $sendPassword
            setPasswordExpired: $setPasswordExpired
          }) {
            user {
              id
            }
          }
        }
      variables: |
        {
          "userID": "{{ nodeID "User" (index .steps.get_user.result.rows 0).user_id }}",
          "password": "new_password",
          "sendPassword": true,
          "setPasswordExpired": true
        }
    admin_api_output:
      result: |
        {
          "data": {
            "resetPassword": {
              "user": {
                "id": "[[string]]"
              }
            }
          },
          "errors": null
        }
  - name: verify_password_changed
    action: query
    query: |
      SELECT _auth_authenticator_password.password_hash AS new_hash
      FROM _auth_authenticator
      JOIN _auth_authenticator_password ON _auth_authenticator_password.id = _auth_authenticator.id
      JOIN _auth_user ON _auth_authenticator.user_id = _auth_user.id
      WHERE _auth_authenticator.app_id = '{{ .AppID }}'
        AND _auth_user.standard_attributes ->> 'preferred_username' = 'change_password_test'
        AND _auth_authenticator_password.password_hash != '{{ (index .steps.get_user.result.rows 0).original_hash }}'
    query_output:
      rows: |
        [
          {
            "new_hash": "[[string]]"
          }
        ]
  - name: verify_email_sent
    action: audit_query
    audit_query: |
      SELECT
        activity_type,
        data->'payload'->>'recipient' AS recipient
      FROM _audit_log
      WHERE app_id = '{{ .AppID }}'
        AND activity_type = 'email.sent'
      ORDER BY created_at, id
    audit_query_output:
      rows: |
        [
          {
            "activity_type": "email.sent",
            "recipient": "change_password_test@example.com"
          }
        ]

---

name: Reset password with sendPassword on user without email returns SendPasswordNoTarget error
before:
  - type: user_import
    user_import: users.json
steps:
  - name: get_user
    action: query
    query: |
      SELECT id AS user_id
      FROM _auth_user
      WHERE app_id = '{{ .AppID }}'
        AND standard_attributes ->> 'preferred_username' = 'change_password_test_no_target'
    query_output:
      rows: |
        [
          {
            "user_id": "[[string]]"
          }
        ]
  - name: reset_password_no_target
    action: admin_api_graphql
    admin_api_request:
      query: |
        mutation resetPasswordMutation(
          $userID: ID!
          $password: String!
          $sendPassword: Boolean
          $setPasswordExpired: Boolean
        ) {
          resetPassword(input: {
            userID: $userID
            password: $password
            sendPassword: $sendPassword
            setPasswordExpired: $setPasswordExpired
          }) {
            user {
              id
            }
          }
        }
      variables: |
        {
          "userID": "{{ nodeID "User" (index .steps.get_user.result.rows 0).user_id }}",
          "password": "new_password",
          "sendPassword": true,
          "setPasswordExpired": true
        }
    admin_api_output:
      result: |
        {
          "data": {
            "resetPassword": null
          },
          "errors": [
            {
              "extensions": {
                "errorName": "Invalid",
                "reason": "SendPasswordNoTarget"
              }
            }
          ]
        }
