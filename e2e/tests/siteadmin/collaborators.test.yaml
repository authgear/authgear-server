name: Site Admin - Collaborators
app_id: e2e-portal
before:
- type: custom_sql
  custom_sql:
    path: fixture/seed_siteadmin_collabs.sql

steps:
# ── List ──────────────────────────────────────────────────────────────────────
- name: list collaborators - beta has none
  action: http_request
  http_request_method: GET
  http_request_url: http://127.0.0.1:4003/api/v1/apps/e2e-collab-beta/collaborators
  http_request_headers:
    X-Authgear-Session-Valid: "true"
    X-Authgear-User-Id: "00000000-0000-0000-0000-000000000001"
  http_output:
    http_status: 200
    json_body: |
      {
        "collaborators": []
      }

- name: list_alpha
  action: http_request
  http_request_method: GET
  http_request_url: http://127.0.0.1:4003/api/v1/apps/e2e-collab-alpha/collaborators
  http_request_headers:
    X-Authgear-Session-Valid: "true"
    X-Authgear-User-Id: "00000000-0000-0000-0000-000000000001"
  http_output:
    http_status: 200
    json_body: |
      {
        "collaborators": [
          {
            "id": "[[string]]",
            "app_id": "e2e-collab-alpha",
            "user_id": "00000000-0000-0000-0000-000000000005",
            "user_email": "gamma-owner@example.com",
            "role": "owner",
            "created_at": "[[string]]"
          }
        ]
      }

# ── Add ───────────────────────────────────────────────────────────────────────
- name: add_collaborator
  action: http_request
  http_request_method: POST
  http_request_url: http://127.0.0.1:4003/api/v1/apps/e2e-collab-beta/collaborators
  http_request_headers:
    X-Authgear-Session-Valid: "true"
    X-Authgear-User-Id: "00000000-0000-0000-0000-000000000001"
    Content-Type: application/json
  http_request_body: |
    {"user_email": "owner@example.com"}
  http_output:
    http_status: 200
    json_body: |
      {
        "id": "[[string]]",
        "app_id": "e2e-collab-beta",
        "user_id": "00000000-0000-0000-0000-000000000002",
        "user_email": "owner@example.com",
        "role": "editor",
        "created_at": "[[string]]"
      }

- name: audit_add_collaborator
  action: audit_query
  audit_query: |
    SELECT
      activity_type,
      data->'payload'->>'collaborator_id' AS collaborator_id,
      data->'payload'->>'user_email'      AS user_email,
      data->'payload'->>'role'            AS role
    FROM _audit_log
    WHERE app_id = 'e2e-portal'
      AND activity_type = 'site_admin.app.collaborator.added'
      AND data->'payload'->>'app_id' = 'e2e-collab-beta'
    ORDER BY created_at DESC
    LIMIT 1
  audit_query_output:
    rows: |
      [
        {
          "activity_type": "site_admin.app.collaborator.added",
          "collaborator_id": "[[string]]",
          "user_email": "owner@example.com",
          "role": "editor"
        }
      ]

- name: list after add - beta has one editor
  action: http_request
  http_request_method: GET
  http_request_url: http://127.0.0.1:4003/api/v1/apps/e2e-collab-beta/collaborators
  http_request_headers:
    X-Authgear-Session-Valid: "true"
    X-Authgear-User-Id: "00000000-0000-0000-0000-000000000001"
  http_output:
    http_status: 200
    json_body: |
      {
        "collaborators": [
          {
            "app_id": "e2e-collab-beta",
            "user_email": "owner@example.com",
            "role": "editor"
          }
        ]
      }

- name: add duplicate returns 409
  action: http_request
  http_request_method: POST
  http_request_url: http://127.0.0.1:4003/api/v1/apps/e2e-collab-beta/collaborators
  http_request_headers:
    X-Authgear-Session-Valid: "true"
    X-Authgear-User-Id: "00000000-0000-0000-0000-000000000001"
    Content-Type: application/json
  http_request_body: |
    {"user_email": "owner@example.com"}
  http_output:
    http_status: 409

- name: add non-existent user returns 404
  action: http_request
  http_request_method: POST
  http_request_url: http://127.0.0.1:4003/api/v1/apps/e2e-collab-beta/collaborators
  http_request_headers:
    X-Authgear-Session-Valid: "true"
    X-Authgear-User-Id: "00000000-0000-0000-0000-000000000001"
    Content-Type: application/json
  http_request_body: |
    {"user_email": "nobody@example.com"}
  http_output:
    http_status: 404

# ── Remove ────────────────────────────────────────────────────────────────────
- name: remove editor
  action: http_request
  http_request_method: DELETE
  http_request_url: http://127.0.0.1:4003/api/v1/apps/e2e-collab-beta/collaborators/{{ .steps.add_collaborator.result.http_json_body.id }}
  http_request_headers:
    X-Authgear-Session-Valid: "true"
    X-Authgear-User-Id: "00000000-0000-0000-0000-000000000001"
  http_output:
    http_status: 200
    json_body: |
      {}

- name: audit_delete_collaborator
  action: audit_query
  audit_query: |
    SELECT
      activity_type,
      data->'payload'->>'collaborator_id' AS collaborator_id,
      data->'payload'->>'user_email'      AS user_email
    FROM _audit_log
    WHERE app_id = 'e2e-portal'
      AND activity_type = 'site_admin.app.collaborator.deleted'
      AND data->'payload'->>'app_id' = 'e2e-collab-beta'
    ORDER BY created_at DESC
    LIMIT 1
  audit_query_output:
    rows: |
      [
        {
          "activity_type": "site_admin.app.collaborator.deleted",
          "collaborator_id": "[[string]]",
          "user_email": "owner@example.com"
        }
      ]

- name: list after remove - beta empty again
  action: http_request
  http_request_method: GET
  http_request_url: http://127.0.0.1:4003/api/v1/apps/e2e-collab-beta/collaborators
  http_request_headers:
    X-Authgear-Session-Valid: "true"
    X-Authgear-User-Id: "00000000-0000-0000-0000-000000000001"
  http_output:
    http_status: 200
    json_body: |
      {
        "collaborators": []
      }

- name: remove non-existent collaborator returns 404
  action: http_request
  http_request_method: DELETE
  http_request_url: http://127.0.0.1:4003/api/v1/apps/e2e-collab-beta/collaborators/00000000-0000-0000-0000-000000000099
  http_request_headers:
    X-Authgear-Session-Valid: "true"
    X-Authgear-User-Id: "00000000-0000-0000-0000-000000000001"
  http_output:
    http_status: 404

# ── Promote ───────────────────────────────────────────────────────────────────
- name: get_gamma_editor_collab
  action: query
  query: |
    SELECT id FROM _portal_app_collaborator
    WHERE app_id = 'e2e-collab-gamma'
    AND user_id = '00000000-0000-0000-0000-000000000004'
  query_output:
    rows: |
      [{"id": "[[string]]"}]

- name: promote editor to owner
  action: http_request
  http_request_method: POST
  http_request_url: http://127.0.0.1:4003/api/v1/apps/e2e-collab-gamma/collaborators/{{ index (index .steps.get_gamma_editor_collab.result.rows 0) "id" }}/promote
  http_request_headers:
    X-Authgear-Session-Valid: "true"
    X-Authgear-User-Id: "00000000-0000-0000-0000-000000000001"
  http_output:
    http_status: 200
    json_body: |
      {
        "id": "[[string]]",
        "app_id": "e2e-collab-gamma",
        "user_id": "00000000-0000-0000-0000-000000000004",
        "user_email": "editor@example.com",
        "role": "owner",
        "created_at": "[[string]]"
      }

- name: audit_promote_collaborator
  action: audit_query
  audit_query: |
    SELECT
      activity_type,
      data->'payload'->>'new_owner_user_email'      AS new_owner_email,
      data->'payload'->>'demoted_editor_user_email' AS demoted_email
    FROM _audit_log
    WHERE app_id = 'e2e-portal'
      AND activity_type = 'site_admin.app.collaborator.promoted'
      AND data->'payload'->>'app_id' = 'e2e-collab-gamma'
    ORDER BY created_at DESC
    LIMIT 1
  audit_query_output:
    rows: |
      [
        {
          "activity_type": "site_admin.app.collaborator.promoted",
          "new_owner_email": "editor@example.com",
          "demoted_email": "gamma-owner@example.com"
        }
      ]

- name: verify roles swapped after promote
  action: query
  query: |
    SELECT user_id, role FROM _portal_app_collaborator
    WHERE app_id = 'e2e-collab-gamma'
    ORDER BY role
  query_output:
    rows: |
      [
        {"user_id": "00000000-0000-0000-0000-000000000005", "role": "editor"},
        {"user_id": "00000000-0000-0000-0000-000000000004", "role": "owner"}
      ]

- name: promote already-owner returns 409
  action: http_request
  http_request_method: POST
  http_request_url: http://127.0.0.1:4003/api/v1/apps/e2e-collab-gamma/collaborators/{{ index (index .steps.get_gamma_editor_collab.result.rows 0) "id" }}/promote
  http_request_headers:
    X-Authgear-Session-Valid: "true"
    X-Authgear-User-Id: "00000000-0000-0000-0000-000000000001"
  http_output:
    http_status: 409

- name: remove owner succeeds
  action: http_request
  http_request_method: DELETE
  http_request_url: http://127.0.0.1:4003/api/v1/apps/e2e-collab-gamma/collaborators/{{ index (index .steps.get_gamma_editor_collab.result.rows 0) "id" }}
  http_request_headers:
    X-Authgear-Session-Valid: "true"
    X-Authgear-User-Id: "00000000-0000-0000-0000-000000000001"
  http_output:
    http_status: 200
    json_body: |
      {}

- name: promote non-existent collaborator returns 404
  action: http_request
  http_request_method: POST
  http_request_url: http://127.0.0.1:4003/api/v1/apps/e2e-collab-gamma/collaborators/00000000-0000-0000-0000-000000000099/promote
  http_request_headers:
    X-Authgear-Session-Valid: "true"
    X-Authgear-User-Id: "00000000-0000-0000-0000-000000000001"
  http_output:
    http_status: 404
