name: Site Admin - Plans
app_id: e2e-portal
authgear.yaml:
  override: |
    http:
      public_origin: "http://localhost:4000"
before:
- type: custom_sql
  custom_sql:
    path: fixture/seed_siteadmin_actor.sql
- type: custom_sql
  custom_sql:
    path: fixture/seed_siteadmin_apps.sql
- type: custom_sql
  custom_sql:
    path: fixture/insert_plans.sql

steps:
# ── Authentication ─────────────────────────────────────────────────────────
# Generate a Bearer access token for the test actor via the e2e-portal OAuth
# server at localhost:4000 (SITEADMIN_AUTHGEAR_ENDPOINT).
- name: generate_token
  action: generate_refresh_token
  generate_refresh_token_user_id: "00000000-0000-0000-0000-000000000001"
  generate_refresh_token_client_id: e2e

- name: get_access_token
  action: http_request
  http_request_method: POST
  http_request_url: http://localhost:4000/oauth2/token
  http_request_form_urlencoded_body:
    grant_type: refresh_token
    refresh_token: "{{ .steps.generate_token.result.refresh_token }}"
    client_id: e2e
  http_output:
    http_status: 200
    json_body: |
      {
        "access_token": "[[string]]"
      }

# ── List Plans ────────────────────────────────────────────────────────────────
- name: list_plans
  action: http_request
  http_request_method: GET
  http_request_url: http://127.0.0.1:4003/api/v1/plans
  http_request_headers:
    Authorization: "Bearer {{ .steps.get_access_token.result.http_json_body.access_token }}"
  http_output:
    http_status: 200
    json_body: |
      {
        "plans": "[[array]]"
      }

- name: verify_known_plans_in_db
  action: query
  query: |
    SELECT name FROM _portal_plan
    WHERE name IN ('free', 'startups', 'enterprise')
    ORDER BY name
  query_output:
    rows: |
      [
        {"name": "enterprise"},
        {"name": "free"},
        {"name": "startups"}
      ]

# ── Change App Plan ───────────────────────────────────────────────────────────
# Use beta here so this test does not mutate alpha, which apps.test.yaml relies
# on remaining in the startups plan for filter/sort assertions.
- name: change_plan_to_enterprise
  action: http_request
  http_request_method: POST
  http_request_url: http://127.0.0.1:4003/api/v1/apps/e2e-siteadmin-app-beta/plan
  http_request_headers:
    Authorization: "Bearer {{ .steps.get_access_token.result.http_json_body.access_token }}"
    Content-Type: application/json
  http_request_body: |
    {"plan_name": "enterprise"}
  http_output:
    http_status: 200
    json_body: |
      {
        "id": "e2e-siteadmin-app-beta",
        "plan": "enterprise"
      }

- name: verify_plan_updated_in_db
  action: query
  query: |
    SELECT plan_name FROM _portal_config_source
    WHERE app_id = 'e2e-siteadmin-app-beta'
  query_output:
    rows: |
      [{"plan_name": "enterprise"}]

- name: audit_change_plan
  action: audit_query
  audit_query: |
    SELECT
      activity_type,
      data->'payload'->>'app_id'   AS affected_app_id,
      data->'payload'->>'old_plan' AS old_plan,
      data->'payload'->>'new_plan' AS new_plan
    FROM _audit_log
    WHERE app_id = 'e2e-portal'
      AND activity_type = 'site_admin.app.plan.updated'
      AND data->'payload'->>'app_id' = 'e2e-siteadmin-app-beta'
    ORDER BY created_at DESC
    LIMIT 1
  audit_query_output:
    rows: |
      [
        {
          "activity_type": "site_admin.app.plan.updated",
          "affected_app_id": "e2e-siteadmin-app-beta",
          "old_plan": "[[string]]",
          "new_plan": "enterprise"
        }
      ]

- name: change_plan_back_to_free
  action: http_request
  http_request_method: POST
  http_request_url: http://127.0.0.1:4003/api/v1/apps/e2e-siteadmin-app-beta/plan
  http_request_headers:
    Authorization: "Bearer {{ .steps.get_access_token.result.http_json_body.access_token }}"
    Content-Type: application/json
  http_request_body: |
    {"plan_name": "free"}
  http_output:
    http_status: 200
    json_body: |
      {
        "id": "e2e-siteadmin-app-beta",
        "plan": "free"
      }

- name: change_plan_non_existent_plan_returns_404
  action: http_request
  http_request_method: POST
  http_request_url: http://127.0.0.1:4003/api/v1/apps/e2e-siteadmin-app-beta/plan
  http_request_headers:
    Authorization: "Bearer {{ .steps.get_access_token.result.http_json_body.access_token }}"
    Content-Type: application/json
  http_request_body: |
    {"plan_name": "non-existent-plan"}
  http_output:
    http_status: 404

- name: change_plan_non_existent_app_returns_404
  action: http_request
  http_request_method: POST
  http_request_url: http://127.0.0.1:4003/api/v1/apps/non-existent-app/plan
  http_request_headers:
    Authorization: "Bearer {{ .steps.get_access_token.result.http_json_body.access_token }}"
    Content-Type: application/json
  http_request_body: |
    {"plan_name": "startups"}
  http_output:
    http_status: 404

- name: change_plan_missing_plan_name_returns_400
  action: http_request
  http_request_method: POST
  http_request_url: http://127.0.0.1:4003/api/v1/apps/e2e-siteadmin-app-beta/plan
  http_request_headers:
    Authorization: "Bearer {{ .steps.get_access_token.result.http_json_body.access_token }}"
    Content-Type: application/json
  http_request_body: |
    {}
  http_output:
    http_status: 400
