# yaml-language-server: $schema=https://raw.githubusercontent.com/oapi-codegen/oapi-codegen/HEAD/configuration-schema.json
package: model
generate:
  models: true
output: gen.go
output-options:
  exclude-schemas:
    - APIError
    - ErrorEnvelope
  type-mapping:
    string:
      formats:
        email:
          type: string
