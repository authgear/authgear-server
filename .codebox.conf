args:
  create:
    - python=3.12
    - node=24
    - psql
    - podman

port-forward:
  - 3100:3100
  - 8000:8000
  - 8010:8010

builder:
  additional-run:
    - apt-get update && apt-get install -y --no-install-recommends pkg-config libicu-dev libvips-dev libmagic-dev libmagic-mgc tzdata && rm -rf /var/lib/apt/lists/*
    - bash -c 'arch=$(uname -m); case $arch in x86_64) arch=amd64;; aarch64) arch=arm64;; esac; rm -rf /usr/local/go && curl -fsSL "https://go.dev/dl/go1.26.4.linux-${arch}.tar.gz" | tar -C /usr/local -xz'
    - echo 'export PATH="/usr/local/go/bin:$PATH"' >> /home/user/.profile
