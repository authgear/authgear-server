query fraudProtectionOverviewQuery($rangeFrom: DateTime, $rangeTo: DateTime) {
  fraudProtectionOverview(rangeFrom: $rangeFrom, rangeTo: $rangeTo) {
    sendSMS {
      total
      blocked
      flagged
      topSourceIPs {
        ipAddress
        geoCountryCode
        total
        blocked
        flagged
      }
      topIPLocations {
        geoCountryCode
        total
        blocked
        flagged
      }
      topSMSOrigins {
        phoneCountryCode
        total
        blocked
        flagged
      }
      timeBuckets {
        hour
        total
        blocked
        flagged
      }
    }
  }
}
