mutation createDomainMutation($appID: ID!, $domain: String!, $apexDomain: String) {
  createDomain(input: { appID: $appID, domain: $domain, apexDomain: $apexDomain }) {
    app {
      id
      domains {
        id
        createdAt
        domain
        cookieDomain
        apexDomain
        isCustom
        isVerified
        verificationDNSRecord
      }
    }
    domain {
      id
      createdAt
      domain
      cookieDomain
      apexDomain
      isCustom
      isVerified
      verificationDNSRecord
    }
  }
}
